<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00704A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SBUXパスポート">
<title>マイストアパスポート｜スターバックス</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00704A;--dark:#1E3932;--gold:#CBA258;--light:#D4E9E2;
  --white:#FFFFFF;--text:#1a1a1a;--muted:#767676;--border:#E0DEDD;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;height:100dvh;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);background:var(--dark);overflow:hidden}

/* HEADER */
header{height:52px;background:var(--dark);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:1000;position:relative;padding-top:var(--safe-top)}
.h-logo{display:flex;align-items:center;gap:8px}
.h-logo svg{width:30px;height:30px}
.h-title{font-size:13px;font-weight:700;color:var(--white)}
.h-sub{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.05em}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.h-stamp{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap}
.h-stamp em{font-style:normal;font-size:15px;font-weight:700;color:#6ee7b7}
#sync-btn{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:14px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#sync-btn.loaded{background:var(--green);border-color:var(--green)}

/* ROOT */
#root{display:flex;flex-direction:column;height:calc(100dvh - 52px - var(--safe-top))}

/* MAP */
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%;z-index:1}
.leaflet-control-attribution{font-size:9px!important}
.leaflet-bottom.leaflet-right{bottom:60px!important;right:8px!important}.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,.2)!important}
.leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:36px!important;font-size:20px!important}

/* 検索バー */
#search-bar{position:absolute;top:10px;left:10px;right:10px;z-index:500;display:flex;box-shadow:0 2px 12px rgba(0,0,0,.25);border-radius:10px;overflow:hidden}
#s-in{flex:1;padding:11px 14px;border:none;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;background:var(--white)}
#s-go{padding:11px 16px;background:var(--green);color:var(--white);border:none;font-size:14px;cursor:pointer}

/* 凡例（左下・縮尺ボタンの上） */
#legend{position:absolute;right:8px;top:62px;z-index:500;background:var(--white);border-radius:8px;padding:7px 10px;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:10px}
.leg{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.leg:last-child{margin-bottom:0}
.leg svg{width:11px;height:14px;display:block}
.leg-me{width:9px;height:9px;border-radius:50%;background:#3B82F6;border:2px solid white;box-shadow:0 0 0 1.5px #3B82F6}

/* FABボタン（右下・ボトムシートの上） */
#fab-loc{position:fixed;right:14px;bottom:80px;z-index:1500;width:46px;height:46px;border-radius:50%;background:var(--white);border:none;box-shadow:0 2px 12px rgba(0,0,0,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:bottom .3s}
#fab-loc svg{width:22px;height:22px;fill:var(--green)}
#fab-loc:active{background:var(--light)}

/* ポップアップ */
#popup{position:absolute;z-index:700;left:50%;background:var(--white);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.22);padding:12px 14px 14px;width:240px;opacity:0;pointer-events:none;transform:translate(-50%,4px) scale(.97);transition:opacity .18s,transform .18s}
#popup.open{opacity:1;pointer-events:auto;transform:translate(-50%,0) scale(1)}
#popup::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-bottom:none;border-top-color:var(--white)}
.pop-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;line-height:1.3}
.pop-sub{font-size:11px;color:var(--muted);line-height:1.4}
.pop-dist{font-size:10px;color:var(--green);font-weight:500;margin-top:2px}
.pop-div{border:none;border-top:1px solid var(--border);margin:10px 0}
.pop-stamp-row{display:flex;align-items:center;gap:10px}
.pop-lbl{font-size:12px;font-weight:500;flex:1}
.toggle{width:44px;height:24px;background:#ccc;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.knob{width:20px;height:20px;background:var(--white);border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .knob{left:22px}
.pop-close{margin-top:10px;width:100%;padding:8px;background:#f0f0f0;border:none;border-radius:7px;font-size:12px;color:var(--muted);font-family:'Noto Sans JP',sans-serif;cursor:pointer}

/* BOTTOM SHEET */
#bottom-sheet{background:var(--white);border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15);flex-shrink:0;max-height:50vh;display:flex;flex-direction:column;z-index:800;position:relative;padding-bottom:var(--safe-bot)}
.sheet-handle-area{padding:8px;text-align:center}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto}
.filter-row{display:flex;gap:6px;padding:0 12px 8px;overflow-x:auto}
.filter-row::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.pill.on{background:var(--green);border-color:var(--green);color:var(--white)}
.prog-row{display:flex;align-items:center;gap:8px;padding:0 14px 8px}
.prog-track{flex:1;height:4px;background:#eee;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.prog-txt{font-size:10px;color:var(--muted);white-space:nowrap}
.prog-txt em{font-style:normal;font-weight:700;color:var(--green)}
#list{overflow-y:auto;flex:1}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.s-card{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.s-card:active{background:#f0f9f4}
.s-card.sel{background:#f0f9f4;border-left:3px solid var(--green)}
.card-pin svg{width:13px;height:17px;display:block;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-dist{font-size:10px;color:var(--green);font-weight:500}
.ctag{font-size:9px;padding:1px 5px;border-radius:2px;margin-left:3px;background:#d4ede3;color:var(--dark);font-weight:700}
.empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}

/* LOADING / TOAST / ERR */
#loading{position:fixed;inset:0;background:rgba(30,57,50,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
.spin{width:42px;height:42px;border:3px solid rgba(255,255,255,.2);border-top-color:#6ee7b7;border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:rgba(255,255,255,.8);font-weight:500}
#loading small{font-size:11px;color:rgba(255,255,255,.4)}
#toast{position:fixed;bottom:calc(56px + var(--safe-bot));left:50%;transform:translateX(-50%);background:var(--dark);color:var(--white);padding:9px 18px;border-radius:18px;font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;z-index:9998;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#err-banner{position:fixed;top:calc(52px + var(--safe-top));left:0;right:0;z-index:2000;background:#c0392b;color:white;padding:10px 16px;font-size:12px;display:none;text-align:center}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p id="load-msg">データを読み込み中...</p>
  <small>初回は少し時間がかかります</small>
</div>
<div id="err-banner"></div>

<header>
  <div class="h-logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#00704A"/>
      <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="50" cy="50" r="22" fill="none" stroke="white" stroke-width="2"/>
      <text x="50" y="58" text-anchor="middle" fill="white" font-size="26" font-family="Georgia,serif" font-weight="bold">★</text>
    </svg>
    <div>
      <div class="h-title">マイストアパスポート</div>
      <div class="h-sub">Starbucks Coffee Japan</div>
    </div>
  </div>
  <div class="h-right">
    <div class="h-stamp"><em id="hdr-n">0</em>/<span id="hdr-t">0</span></div>
    <label id="sync-btn">
      🔄 同期
      <input type="file" id="stamps-file" accept=".json" style="display:none">
    </label>
  </div>
</header>

<div id="root">
  <div id="map-wrap">
    <div id="map"></div>

    <div id="search-bar">
      <input id="s-in" type="search" placeholder="店舗名・住所で検索..." />
      <button id="s-go">🔍</button>
    </div>

    <div id="legend">
      <div class="leg">
        <svg viewBox="0 0 14 18"><path d="M7 0C3.69 0 1 2.69 1 6c0 5.25 6 12 6 12S13 11.25 13 6C13 2.69 10.31 0 7 0z" fill="#00704A" stroke="#004D31" stroke-width=".8"/><circle cx="7" cy="6" r="2.5" fill="white"/></svg>
        取得済み
      </div>
      <div class="leg">
        <svg viewBox="0 0 14 18"><path d="M7 0C3.69 0 1 2.69 1 6c0 5.25 6 12 6 12S13 11.25 13 6C13 2.69 10.31 0 7 0z" fill="white" stroke="#aaa" stroke-width="1.2"/><circle cx="7" cy="6" r="2.5" fill="#ddd"/></svg>
        未取得
      </div>
      <div class="leg"><div class="leg-me"></div>現在地</div>
    </div>

    <button id="fab-loc" title="現在地">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    </button>

    <div id="popup">
      <div class="pop-name" id="p-name"></div>
      <div class="pop-sub" id="p-addr"></div>
      <div class="pop-dist" id="p-dist"></div>
      <hr class="pop-div">
      <div class="pop-stamp-row">
        <span class="pop-lbl" id="p-lbl">スタンプ未取得</span>
        <div class="toggle" id="p-tog"><div class="knob"></div></div>
      </div>
      <button class="pop-close" id="pop-close">閉じる</button>
    </div>
  </div>

  <div id="bottom-sheet">
    <div class="sheet-handle-area"><div class="sheet-handle"></div></div>
    <div class="filter-row">
      <button class="pill on" data-f="all">すべて</button>
      <button class="pill" data-f="near">近く(1km)</button>
      <button class="pill" data-f="stamped">取得済み</button>
      <button class="pill" data-f="unstamped">未取得</button>
    </div>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-txt"><em id="prog-n">0</em> / <span id="prog-t">0</span> 取得</div>
    </div>
    <div id="list"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const STORES_URL = "./stores.json";
let map, meLayer = null, userPos = null;
let stores = [], selId = null, filter = "all", query = "";
const STAMPS = JSON.parse(localStorage.getItem("sbux_stamps_v2") || "{}");
let syncedIds = new Set(JSON.parse(localStorage.getItem("sbux_synced_ids") || "[]"));

/* 地図 */
map = L.map("map", { zoomControl: true }).setView([35.6812, 139.7671], 12);
map.zoomControl.setPosition("bottomleft");
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

/* 起動 */
window.addEventListener("load", async () => {
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
  const [,storeData] = await Promise.allSettled([getLocation(), loadStores()]);
  if (storeData.status === "fulfilled" && storeData.value) processStores(storeData.value);
  else showErr("店舗データの読み込みに失敗しました");
  showLoad(false);
  updateFabPos();
});

async function loadStores() {
  setMsg("店舗データを読み込み中...");
  const res = await fetch(STORES_URL + "?v=" + Date.now());
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function processStores(data) {
  const list = data.stores || [];
  setMsg("マーカーを配置中... (" + list.length + " 件)");
  list.forEach(s => {
    if (s.lat == null || s.lng == null) return;
    s.stamped = syncedIds.has(String(s.id)) || STAMPS[s.id] || false;
    s.dist = userPos ? hav(userPos, {lat:s.lat, lng:s.lng}) : null;
    s.marker = makeMarker(s);
    stores.push(s);
  });
  stores.sort((a,b) => (a.dist??Infinity)-(b.dist??Infinity));
  if (userPos && stores.length) map.setView([userPos.lat, userPos.lng], 14);
  else if (stores.length) map.setView([stores[0].lat, stores[0].lng], 12);
  renderAll();
  toast(stores.length + " 店舗を読み込みました");
  // ボトムシートの高さ変化を監視してFAB位置を更新
  new ResizeObserver(updateFabPos).observe(document.getElementById("bottom-sheet"));
  updateFabPos();
}

/* 位置情報 */
async function getLocation() {
  setMsg("現在地を取得中...");
  return new Promise(res => {
    if (!navigator.geolocation) { res(null); return; }
    navigator.geolocation.getCurrentPosition(
      p => { userPos = {lat:p.coords.latitude, lng:p.coords.longitude}; placeMe(userPos); res(userPos); },
      () => res(null), {timeout:8000}
    );
  });
}
function placeMe(pos) {
  if (meLayer) map.removeLayer(meLayer);
  meLayer = L.circleMarker([pos.lat,pos.lng], {radius:9,fillColor:"#3B82F6",fillOpacity:1,color:"white",weight:2.5}).addTo(map).bindTooltip("現在地");
}

/* マーカー */
function pinSVG(stamped, selected) {
  const w=selected?34:24, h=selected?44:32;
  const fill=stamped?"#00704A":"#FFFFFF", strk=stamped?"#004D31":"#AAAAAA", dot=stamped?"#FFFFFF":"#CCCCCC";
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 24 32"><path d="M12 1C6.48 1 2 5.48 2 11c0 8 10 20 10 20s10-12 10-20C22 5.48 17.52 1 12 1z" fill="'+fill+'" stroke="'+strk+'" stroke-width="1.5"/><circle cx="12" cy="11" r="4" fill="'+dot+'"/></svg>';
}
function makeIcon(stamped, selected) {
  const w=selected?34:24, h=selected?44:32;
  return L.divIcon({html:pinSVG(stamped,selected),className:"",iconSize:[w,h],iconAnchor:[w/2,h],tooltipAnchor:[0,-h]});
}
function makeMarker(s) {
  const m = L.marker([s.lat,s.lng], {icon:makeIcon(s.stamped,false)}).addTo(map).bindTooltip(s.name,{direction:"top",offset:[0,-10],opacity:.92});
  m.on("click", () => selectStore(s.id));
  return m;
}
function refreshIcon(s) {
  const sel = s.id === selId;
  s.marker.setIcon(makeIcon(s.stamped, sel));
  s.marker.setZIndexOffset(sel ? 1000 : 0);
}

/* FAB位置をボトムシートの上に追従 */
function updateFabPos() {
  const fab = document.getElementById("fab-loc");
  const sheet = document.getElementById("bottom-sheet");
  if (!fab || !sheet) return;
  // position:fixed なのでウィンドウ基準で下から計算
  const sheetRect = sheet.getBoundingClientRect();
  const fromBottom = window.innerHeight - sheetRect.top;
  fab.style.bottom = (fromBottom + 12) + "px";
}

/* 店舗選択 */
function selectStore(id) {
  const prev = stores.find(x => x.id === selId);
  if (prev) refreshIcon(prev);
  closePopupEl();

  selId = id;
  const s = stores.find(x => x.id === id);
  if (!s) return;
  refreshIcon(s);
  panToVisible(s.lat, s.lng);

  document.getElementById("p-name").textContent = s.name;
  document.getElementById("p-addr").textContent = s.address || s.prefecture || "住所情報なし";
  document.getElementById("p-dist").textContent = s.dist != null ? "📍 現在地から約 " + fmtD(s.dist) : "";
  const tog = document.getElementById("p-tog");
  tog.className = "toggle" + (s.stamped ? " on" : "");
  document.getElementById("p-lbl").textContent = s.stamped ? "✅ スタンプ取得済み" : "スタンプ未取得";

  setTimeout(() => positionPopup(s), 450);
  renderList();
}

// ピンを「見えているマップエリアの下寄り」に配置し、
// 上部にポップアップ表示用のスペースを確保する
// 「見えているマップエリアの下端」を実際の描画位置から取得する
// (offsetHeightの積算ではなく、ボトムシートの実際の画面上端を使うことで
//  WebView環境でのビューポート計算のズレを回避する)
function getVisibleMapBottom() {
  const sheet = document.getElementById("bottom-sheet");
  const mapEl = document.getElementById("map-wrap");
  if (!sheet || !mapEl) return window.innerHeight;
  const sheetRect = sheet.getBoundingClientRect();
  const mapRect   = mapEl.getBoundingClientRect();
  const result = sheetRect.top - mapRect.top;
  showDebug(`sheetTop=${sheetRect.top.toFixed(0)} mapTop=${mapRect.top.toFixed(0)} mapH=${mapRect.height.toFixed(0)} winH=${window.innerHeight} →visBottom=${result.toFixed(0)}`);
  return result;
}
function showDebug(msg) {
  showDebug.lastMsg = msg;
  let el = document.getElementById("debug-panel");
  if (!el) {
    el = document.createElement("div");
    el.id = "debug-panel";
    el.style.cssText = "position:fixed;top:56px;left:4px;right:4px;background:rgba(255,0,0,.85);color:white;font-size:10px;padding:6px 8px;z-index:99999;border-radius:6px;font-family:monospace;white-space:pre-wrap;";
    document.body.appendChild(el);
  }
  el.textContent = msg;
}

function panToVisible(lat, lng) {
  const mapEl = document.getElementById("map-wrap");
  const mapH  = mapEl ? mapEl.getBoundingClientRect().height : window.innerHeight;
  const visBottom = getVisibleMapBottom(); // 見えているマップ下端（マップ内座標）
  const zoom = Math.max(map.getZoom(), 15);
  map.setZoom(zoom, {animate:false});

  // ピンを「見えている下端から80px上」あたりに配置し、
  // 上側にポップアップ表示用のスペースを確保する
  const targetScreenY = Math.max(visBottom - 80, 200);
  const centerScreenY = mapH / 2;
  const pt = map.project([lat,lng], zoom);
  pt.y -= (centerScreenY - targetScreenY);
  map.panTo(map.unproject(pt, zoom), {animate:true,duration:0.4});
}

// ポップアップはピンの真上・水平方向は画面中央(left:50%はCSS側)に固定。
// topだけJSでピンの真上に来るよう計算する。
function positionPopup(s) {
  const popup = document.getElementById("popup");
  const mapEl = document.getElementById("map-wrap");
  if (!popup || !mapEl) return;

  const visBottom = getVisibleMapBottom(); // 見えているマップ下端（マップ内座標）
  const pt    = map.latLngToContainerPoint([s.lat, s.lng]);
  const popH  = popup.offsetHeight || 160;
  const pinH  = 44;
  const gap   = 10;
  const margin = 60;

  let top = pt.y - pinH - popH - gap;

  // 画面上端を超えないよう保護
  if (top < margin) top = margin;

  // ポップアップの下端がボトムシートの開始位置を超えないよう保護
  // （超える場合はピンの直下に表示する）
  if (top + popH > visBottom - 10) {
    top = pt.y + pinH / 2 + gap;
    // それでもボトムシートに被る場合は、見えているエリアの上部に固定表示
    if (top + popH > visBottom - 10) {
      top = Math.max(margin, visBottom - popH - 10);
    }
  }

  popup.style.top = top + "px";
  popup.classList.add("open");
  showDebug(showDebug.lastMsg + ` | pt.y=${pt.y.toFixed(0)} popH=${popH} → top=${top.toFixed(0)}`);
}

function closePopupEl() {
  document.getElementById("popup").classList.remove("open");
}

function closePopup() {
  closePopupEl();
  const prev = stores.find(x => x.id === selId);
  if (prev) { selId = null; refreshIcon(prev); }
  else selId = null;
  renderList();
}

function toggleStamp() {
  const s = stores.find(x => x.id === selId); if (!s) return;
  s.stamped = !s.stamped;
  STAMPS[s.id] = s.stamped;
  localStorage.setItem("sbux_stamps_v2", JSON.stringify(STAMPS));
  refreshIcon(s);
  const tog = document.getElementById("p-tog");
  tog.className = "toggle" + (s.stamped ? " on" : "");
  document.getElementById("p-lbl").textContent = s.stamped ? "✅ スタンプ取得済み" : "スタンプ未取得";
  toast(s.stamped ? "⭐ スタンプを取得しました！" : "スタンプを取り消しました");
  renderAll();
}

/* リスト */
function getFiltered() {
  return stores.filter(s => {
    if (filter==="stamped" && !s.stamped) return false;
    if (filter==="unstamped" && s.stamped) return false;
    if (filter==="near" && (s.dist==null || s.dist>1000)) return false;
    if (query && !s.name.includes(query) && !(s.address||"").includes(query) && !(s.prefecture||"").includes(query)) return false;
    return true;
  });
}
function renderList() {
  const el = document.getElementById("list");
  const list = getFiltered();
  if (!list.length) { el.innerHTML = '<div class="empty">該当する店舗が見つかりませんでした</div>'; return; }
  el.innerHTML = list.map(s => {
    const fill=s.stamped?"#00704A":"white", strk=s.stamped?"#004D31":"#aaa", dot=s.stamped?"white":"#ddd";
    return '<div class="s-card'+(s.id===selId?" sel":"")+'" data-id="'+s.id+'">' +
      '<div class="card-pin"><svg viewBox="0 0 14 18"><path d="M7 0C3.69 0 1 2.69 1 6c0 5.25 6 12 6 12S13 11.25 13 6C13 2.69 10.31 0 7 0z" fill="'+fill+'" stroke="'+strk+'" stroke-width="'+(s.stamped?".8":"1.2")+'"/><circle cx="7" cy="6" r="2.5" fill="'+dot+'"/></svg></div>' +
      '<div class="card-body"><div class="card-name">'+s.name+(s.stamped?'<span class="ctag">済</span>':'')+'</div>' +
      '<div class="card-sub">'+(s.prefecture||"")+" "+(s.address||"")+'</div>' +
      (s.dist!=null?'<div class="card-dist">📍 '+fmtD(s.dist)+'</div>':'') +
      '</div></div>';
  }).join("");
  el.querySelectorAll(".s-card").forEach(c => c.addEventListener("click", () => selectStore(c.dataset.id)));
}
function renderStats() {
  const n=stores.filter(s=>s.stamped).length, t=stores.length, p=t?Math.round(n/t*100):0;
  document.getElementById("prog-n").textContent=n;
  document.getElementById("prog-t").textContent=t;
  document.getElementById("prog-fill").style.width=p+"%";
  document.getElementById("hdr-n").textContent=n;
  document.getElementById("hdr-t").textContent=t;
}
function renderAll() { renderStats(); renderList(); }

/* UIイベント */
document.getElementById("s-go").addEventListener("click", doSearch);
document.getElementById("s-in").addEventListener("keydown", e => { if(e.key==="Enter") doSearch(); });
function doSearch() {
  query = document.getElementById("s-in").value.trim();
  renderList();
  const hit = getFiltered()[0];
  if (hit) map.setView([hit.lat,hit.lng], 15);
}

document.getElementById("fab-loc").addEventListener("click", () => {
  if (userPos) { panToVisible(userPos.lat, userPos.lng); return; }
  navigator.geolocation && navigator.geolocation.getCurrentPosition(
    p => {
      userPos = {lat:p.coords.latitude, lng:p.coords.longitude};
      placeMe(userPos);
      panToVisible(userPos.lat, userPos.lng);
      stores.forEach(s => { s.dist = hav(userPos,{lat:s.lat,lng:s.lng}); });
      stores.sort((a,b) => (a.dist??Infinity)-(b.dist??Infinity));
      renderAll();
    },
    () => toast("位置情報を取得できませんでした")
  );
});

document.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
  document.querySelectorAll(".pill").forEach(x => x.classList.remove("on"));
  p.classList.add("on"); filter = p.dataset.f; renderList();
}));

document.getElementById("pop-close").addEventListener("click", closePopup);
document.getElementById("p-tog").addEventListener("click", toggleStamp);
window.addEventListener("resize", updateFabPos);

document.getElementById("stamps-file").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const ids = data.stamp_ids || [];
      if (!ids.length) { toast("スタンプIDが見つかりませんでした"); return; }
      syncedIds = new Set(ids.map(String));
      localStorage.setItem("sbux_synced_ids", JSON.stringify([...syncedIds]));
      stores.forEach(s => { s.stamped = syncedIds.has(String(s.id)); refreshIcon(s); });
      const btn = document.getElementById("sync-btn");
      btn.classList.add("loaded");
      btn.firstChild.textContent = "✅ " + ids.length + "店舗同期済み";
      renderAll();
      toast("✅ " + ids.length + " 店舗のスタンプを同期しました");
    } catch(err) { toast("stamps.jsonの読み込みに失敗しました"); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

if (syncedIds.size > 0) {
  const btn = document.getElementById("sync-btn");
  btn.classList.add("loaded");
  btn.firstChild.textContent = "✅ " + syncedIds.size + "店舗同期済み";
}


/* ユーティリティ */
function hav(a,b) {
  const R=6371000,r=x=>x*Math.PI/180,dL=r(b.lat-a.lat),dG=r(b.lng-a.lng);
  const x=Math.sin(dL/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function fmtD(m) { return m<1000?Math.round(m)+"m":(m/1000).toFixed(1)+"km"; }
let tTmr;
function toast(msg) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(tTmr); tTmr=setTimeout(()=>el.classList.remove("show"),2800);
}
function showLoad(v) { document.getElementById("loading").style.display=v?"flex":"none"; }
function setMsg(m) { document.getElementById("load-msg").textContent=m; }
function showErr(msg) { const b=document.getElementById("err-banner"); b.textContent=msg; b.style.display="block"; }
</script>
</body>
